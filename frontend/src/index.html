
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema de Emendas PRO</title>
<style>
body { font-family:Arial;background:#eef2f7;margin:0;}
header {background:#1e3a8a;color:white;padding:15px;font-size:20px;}
.container {padding:20px;}
.card {background:white;padding:20px;margin:10px;display:inline-block;width:28%;border-radius:10px;}
input,button {padding:10px;margin:5px;}
button {background:#2563eb;color:white;border:none;}
table {width:100%;background:white;margin-top:20px;border-collapse:collapse;}
th,td {padding:10px;border-bottom:1px solid #ddd;}
</style>
</head>
<body>
<header>Sistema de Emendas PRO</header>
<div class="container">
<div class="card">Total: <span id="total"></span></div>
<div class="card">Usado: <span id="usado"></span></div>
<div class="card">Saldo: <span id="saldo"></span></div>

<input id="tipo" placeholder="Tipo">
<input id="autor" placeholder="Autor">
<input id="destino" placeholder="Destino">
<input id="valor" placeholder="Valor">
<button onclick="criar()">Salvar</button>

<table>
<thead><tr><th>ID</th><th>Autor</th><th>Valor</th><th>Usado</th><th>Saldo</th></tr></thead>
<tbody id="tabela"></tbody>
</table>
</div>
<script>
const API="https://SEU-BACKEND.onrender.com/emendas";
function criar(){fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tipo:tipo.value,autor:autor.value,destino:destino.value,valorTotal:parseFloat(valor.value),usos:[]})}).then(load);}
function load(){fetch(API).then(r=>r.json()).then(data=>{let total=0,usado=0;const tabela=document.getElementById("tabela");tabela.innerHTML="";data.forEach(e=>{total+=e.valorTotal;usado+=e.valorUsado;tabela.innerHTML+=`<tr><td>${e.id}</td><td>${e.autor}</td><td>${e.valorTotal}</td><td>${e.valorUsado}</td><td>${e.saldo}</td></tr>`;});document.getElementById("total").innerText=total;document.getElementById("usado").innerText=usado;document.getElementById("saldo").innerText=total-usado;});}
load();
</script>
</body>
</html>
